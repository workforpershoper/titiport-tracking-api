<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8"><title>Admin Titiport</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f4; }
        .box { background: white; padding: 20px; border-radius: 8px; max-width: 500px; margin: auto; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #1e3a8a; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2>Input Order Baru</h2>
        <form id="orderForm">
            <input type="text" id="order_id" placeholder="Order ID (Kosongkan = Auto ORD...)">
            <input type="text" id="cust_id" placeholder="Customer ID (Kosongkan = Auto CUS...)">
            <input type="text" id="item_name" placeholder="Nama Barang" required>
            <input type="number" id="qty" value="1" required>
            <select id="jenis_pengiriman"><option value="Handcarry">Handcarry</option><option value="Cargo Udara">Cargo Udara</option></select>
            <input type="url" id="image_url" placeholder="Link Foto Bukti (URL)">
            <button type="submit">Simpan ke Sheets</button>
        </form>
    </div>
    <script>
        document.getElementById('orderForm').onsubmit = async (e) => {
            e.preventDefault();
            const res = await fetch("https://script.google.com/macros/s/AKfycbzd7mMlzp4_YIlLWAsbkEpdSYTHSWKgP8p8DcVSHzdM9NCJG1EAmuiENDkEhMkWrFv9/exec", {
                method: "POST",
                body: JSON.stringify({
                    action: "insert",
                    order_id: document.getElementById('order_id').value,
                    cust_id: document.getElementById('cust_id').value,
                    item_name: document.getElementById('item_name').value,
                    qty: document.getElementById('qty').value,
                    jenis_pengiriman: document.getElementById('jenis_pengiriman').value,
                    image_url: document.getElementById('image_url').value
                })
            });
            const data = await res.json();
            if(data.success) alert("Sukses! Order ID: " + data.order_id);
        }
    </script>
</body>
</html>
