<!DOCTYPE html>
<html>
<head><title>Lacak Pesanan</title>
<style>body{padding:20px; text-align:center;} input{padding:10px; width:80%;} button{padding:10px;}</style>
</head>
<body>
    <h2>Lacak Pesanan Anda</h2>
    <input type="text" id="kw" placeholder="Masukkan ID...">
    <button onclick="track()">Cari</button>
    <div id="res"></div>
    <script>
        async function track() {
            const kw = document.getElementById('kw').value;
            const res = await fetch("https://script.google.com/macros/s/AKfycbzd7mMlzp4_YIlLWAsbkEpdSYTHSWKgP8p8DcVSHzdM9NCJG1EAmuiENDkEhMkWrFv9/exec=" + kw);
            const data = await res.json();
            document.getElementById('res').innerHTML = data.found ? "Ditemukan!" : "Tidak ada";
        }
    </script>
</body>
</html>
